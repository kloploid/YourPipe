# Builds the YourPipe iOS app on macOS runners.
# This is an Xcode project (XcodeGen-generated .xcodeproj) — not a Swift
# Package — so we invoke `xcodebuild` directly. `swift build` would look for
# a Package.swift at the repo root and fail.

name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project YourPipe.xcodeproj \
            -scheme YourPipe \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
